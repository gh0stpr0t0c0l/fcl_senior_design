name: Build and Publish WingFlasher

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        working-directory: desktop_app/wingfeather_app
        run: uv sync --group dev

      - name: Build with PyInstaller
        working-directory: desktop_app/wingfeather_app
        run: uv run pyinstaller WingFlasher.spec --noconfirm

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wingflasher-${{ matrix.os }}
          path: desktop_app/wingfeather_app/dist/

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Zip artifacts for release
        run: |
          cd release-assets
          zip -r ../wingflasher-builds.zip .

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: wingflasher-builds.zip
          generate_release_notes: true
